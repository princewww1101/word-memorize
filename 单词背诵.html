<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词背诵工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f0eb;
    color: #2c2c2c;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 600px;
    padding: 24px;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 48px 40px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
    text-align: center;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 14px;
    color: #999;
    margin-bottom: 32px;
  }

  /* ── Phase 1: Input ── */
  textarea {
    width: 100%;
    height: 200px;
    border: 2px solid #e8e3dd;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-family: inherit;
    line-height: 1.7;
    resize: vertical;
    background: #faf9f7;
    transition: border-color 0.2s;
    color: #2c2c2c;
  }
  textarea:focus {
    outline: none;
    border-color: #c4b5a5;
    background: #fff;
  }
  textarea::placeholder { color: #c5c0b8; }

  .word-count {
    font-size: 13px;
    color: #aaa;
    margin-top: 8px;
    text-align: right;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: #2c2c2c;
    color: #fff;
  }
  .btn-primary:hover { background: #1a1a1a; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }

  .btn-secondary {
    background: #f0ece6;
    color: #2c2c2c;
  }
  .btn-secondary:hover { background: #e6e0d8; }

  .btn-outline {
    background: transparent;
    color: #2c2c2c;
    border: 2px solid #e0dbd4;
  }
  .btn-outline:hover { background: #f5f0eb; }

  .btn-danger {
    background: #e8d5d5;
    color: #8b3a3a;
  }
  .btn-danger:hover { background: #ddc8c8; }

  .btn-large { padding: 16px 40px; font-size: 18px; border-radius: 14px; }
  .btn-block { display: flex; width: 100%; }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 32px;
  }
  .btn-row .btn { flex: 1; }

  .mt-16 { margin-top: 16px; }
  .mt-24 { margin-top: 24px; }
  .mt-32 { margin-top: 32px; }

  /* ── Phase 2: Memorize ── */
  .progress {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 48px;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: #eee;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #2c2c2c;
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .progress-text {
    font-size: 14px;
    font-weight: 600;
    color: #888;
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }

  .word-display {
    font-size: 56px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 1px;
    padding: 32px 16px;
    min-height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    word-break: break-word;
  }

  .error-count-badge {
    display: inline-block;
    background: #f5e6e6;
    color: #8b3a3a;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    margin-left: 8px;
  }

  /* ── Phase 3: Complete ── */
  .result-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }

  .stat {
    font-size: 18px;
    color: #555;
    margin: 8px 0;
  }
  .stat strong { color: #1a1a1a; }

  .divider {
    height: 1px;
    background: #ece7e0;
    margin: 24px 0;
    border: none;
  }

  /* ── Error Book Review ── */
  .review-label {
    display: inline-block;
    background: #f5e6e6;
    color: #8b3a3a;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 16px;
    letter-spacing: 0.5px;
  }

  /* ── Print styles ── */
  @media print {
    body { background: #fff; }
    .app { max-width: 100%; padding: 0; }
    .card { box-shadow: none; border-radius: 0; padding: 24px; }
    .no-print { display: none !important; }
  }

  /* ── Utility ── */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">

  <!-- ═══════════ PHASE 1: Input ═══════════ -->
  <div class="card" id="phase-input">
    <h1>单词背诵工具</h1>
    <p class="subtitle">输入单词列表，开始默写练习</p>

    <textarea id="wordInput" placeholder="每行一个单词，或使用逗号分隔...&#10;例如：&#10;apple&#10;banana, cherry&#10;dolphin"></textarea>
    <div class="word-count" id="wordCount">已识别 0 个单词</div>

    <button class="btn btn-primary btn-large btn-block mt-24" onclick="startMemorize()">
      开始背诵
    </button>
  </div>

  <!-- ═══════════ PHASE 2: Memorize ═══════════ -->
  <div class="card hidden" id="phase-memorize">
    <h1>单词背诵</h1>

    <div class="progress">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <span class="progress-text" id="progressText">0 / 0</span>
    </div>

    <div class="word-display" id="wordDisplay"></div>

    <p class="subtitle" style="margin-bottom:0">请在纸上写下对应的中文释义</p>

    <div class="btn-row">
      <button class="btn btn-danger" onclick="addToErrorBook()">
        加入错题本 <span id="errorBadge" class="error-count-badge hidden">0</span>
      </button>
      <button class="btn btn-primary" id="btnNext" onclick="nextWord()">
        下一个
      </button>
    </div>
  </div>

  <!-- ═══════════ PHASE 3: Complete ═══════════ -->
  <div class="card hidden" id="phase-complete">
    <h1>背诵完成</h1>

    <p class="stat mt-24">总单词数 <strong id="statTotal">0</strong></p>
    <p class="stat">错题数 <strong id="statErrors">0</strong></p>
    <p class="stat">正确率 <strong id="statAccuracy">0%</strong></p>

    <hr class="divider">

    <div id="completeActions">
      <button class="btn btn-danger btn-block mt-16" id="btnReviewErrors" onclick="reviewErrorBook()">
        查看错题本
      </button>
      <button class="btn btn-secondary btn-block mt-16" onclick="askExport()">
        导出错题本 (PDF)
      </button>
      <button class="btn btn-outline btn-block mt-16" onclick="resetAll()">
        重新开始
      </button>
    </div>

    <!-- Export confirmation -->
    <div id="exportConfirm" class="hidden">
      <p class="stat">错题本共有 <strong id="exportErrorCount">0</strong> 个单词</p>
      <p class="subtitle" style="margin-bottom:0">点击下方按钮，在打印对话框中选择"另存为 PDF"</p>

      <div class="btn-row mt-24">
        <button class="btn btn-outline" onclick="cancelExport()">取消</button>
        <button class="btn btn-primary" onclick="doExportPDF()">导出 PDF</button>
      </div>
    </div>
  </div>

  <!-- ═══════════ PHASE: Error Book Review ═══════════ -->
  <div class="card hidden" id="phase-review">
    <h1>错题本复习</h1>
    <span class="review-label">错题本</span>

    <div class="progress">
      <div class="progress-bar">
        <div class="progress-fill" id="reviewProgressFill" style="width: 0%"></div>
      </div>
      <span class="progress-text" id="reviewProgressText">0 / 0</span>
    </div>

    <div class="word-display" id="reviewWordDisplay"></div>

    <p class="subtitle" style="margin-bottom:0">再次默写，加深记忆</p>

    <button class="btn btn-primary btn-large btn-block mt-32" id="btnReviewNext" onclick="nextReviewWord()">
      下一个
    </button>
  </div>

</div>

<!-- Hidden iframe for PDF export -->
<iframe id="printFrame" style="display:none" title="print"></iframe>

<script>
// ── State ──
let words = [];
let errorBook = [];
let currentIndex = 0;
let isReviewing = false;
let reviewIndex = 0;

// ── DOM refs ──
const $ = (id) => document.getElementById(id);

// ── Parse input ──
function parseWords() {
  const raw = $('wordInput').value.trim();
  if (!raw) return [];
  return raw
    .split(/[\n,，]+/)
    .map(w => w.trim())
    .filter(w => w.length > 0);
}

// Live word count
$('wordInput').addEventListener('input', () => {
  const count = parseWords().length;
  $('wordCount').textContent = `已识别 ${count} 个单词`;
});

// ── Fisher-Yates shuffle ──
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Switch phase ──
function showPhase(phaseId) {
  ['phase-input', 'phase-memorize', 'phase-complete', 'phase-review'].forEach(id => {
    $(id).classList.add('hidden');
  });
  $(phaseId).classList.remove('hidden');
}

// ── Phase 1 → 2: Start ──
function startMemorize() {
  words = parseWords();
  if (words.length === 0) {
    alert('请先输入至少一个单词！');
    return;
  }
  words = shuffle(words);
  errorBook = [];
  currentIndex = 0;
  isReviewing = false;
  showPhase('phase-memorize');
  showCurrentWord();
}

// ── Display current word ──
function showCurrentWord() {
  if (currentIndex >= words.length) {
    finishMemorize();
    return;
  }
  $('wordDisplay').textContent = words[currentIndex];

  const pct = ((currentIndex) / words.length * 100).toFixed(0);
  $('progressFill').style.width = pct + '%';
  $('progressText').textContent = `${currentIndex} / ${words.length}`;

  updateErrorBadge();
}

function updateErrorBadge() {
  const badge = $('errorBadge');
  if (errorBook.length > 0) {
    badge.textContent = errorBook.length;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

// ── Next word ──
function nextWord() {
  currentIndex++;
  showCurrentWord();
}

// ── Add to error book ──
function addToErrorBook() {
  const word = words[currentIndex];
  if (!errorBook.includes(word)) {
    errorBook.push(word);
  }
  currentIndex++;
  showCurrentWord();
}

// ── Finish memorizing ──
function finishMemorize() {
  const total = words.length;
  const errors = errorBook.length;
  const accuracy = total > 0 ? Math.round((total - errors) / total * 100) : 100;

  $('statTotal').textContent = total;
  $('statErrors').textContent = errors;
  $('statAccuracy').textContent = accuracy + '%';

  $('completeActions').classList.remove('hidden');
  $('exportConfirm').classList.add('hidden');

  if (errors === 0) {
    $('btnReviewErrors').style.opacity = '0.4';
    $('btnReviewErrors').style.pointerEvents = 'none';
  } else {
    $('btnReviewErrors').style.opacity = '1';
    $('btnReviewErrors').style.pointerEvents = 'auto';
  }

  showPhase('phase-complete');
}

// ── Review error book ──
function reviewErrorBook() {
  if (errorBook.length === 0) return;
  isReviewing = true;
  reviewIndex = 0;
  showPhase('phase-review');
  showReviewWord();
}

function showReviewWord() {
  if (reviewIndex >= errorBook.length) {
    // Review finished, go back to complete with export prompt
    showPhase('phase-complete');
    $('completeActions').classList.add('hidden');
    askExport();
    return;
  }
  $('reviewWordDisplay').textContent = errorBook[reviewIndex];

  const pct = (reviewIndex / errorBook.length * 100).toFixed(0);
  $('reviewProgressFill').style.width = pct + '%';
  $('reviewProgressText').textContent = `${reviewIndex} / ${errorBook.length}`;
}

function nextReviewWord() {
  reviewIndex++;
  showReviewWord();
}

// ── Export flow ──
function askExport() {
  if (errorBook.length === 0) {
    alert('错题本为空，没有需要导出的单词。');
    return;
  }
  $('completeActions').classList.add('hidden');
  $('exportConfirm').classList.remove('hidden');
  $('exportErrorCount').textContent = errorBook.length;
}

function cancelExport() {
  $('exportConfirm').classList.add('hidden');
  $('completeActions').classList.remove('hidden');
}

function doExportPDF() {
  const now = new Date();
  const dateStr = [
    now.getFullYear(),
    String(now.getMonth() + 1).padStart(2, '0'),
    String(now.getDate()).padStart(2, '0')
  ].join('-');

  const content = `<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>错题本-${dateStr}</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 40px; color: #1a1a1a; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  .date { font-size: 14px; color: #888; margin-bottom: 24px; }
  .word-list { list-style: none; padding: 0; }
  .word-list li { font-size: 20px; padding: 12px 0; border-bottom: 1px solid #eee; font-weight: 500; }
  .count { font-size: 14px; color: #888; margin-bottom: 16px; }
</style></head>
<body>
  <h1>错题本</h1>
  <p class="date">${dateStr}</p>
  <p class="count">共 ${errorBook.length} 个单词</p>
  <ol class="word-list">
    ${errorBook.map(w => `<li>${w}</li>`).join('\n    ')}
  </ol>
</body></html>`;

  const frame = $('printFrame');
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(content);
  doc.close();

  frame.onload = function() {
    frame.contentWindow.focus();
    frame.contentWindow.print();
  };
  // Some browsers fire onload from write/close, some don't — call print after a short delay as fallback
  setTimeout(() => {
    frame.contentWindow.focus();
    frame.contentWindow.print();
  }, 300);
}

// ── Reset ──
function resetAll() {
  words = [];
  errorBook = [];
  currentIndex = 0;
  isReviewing = false;
  reviewIndex = 0;
  $('wordInput').value = '';
  $('wordCount').textContent = '已识别 0 个单词';
  $('completeActions').classList.remove('hidden');
  $('exportConfirm').classList.add('hidden');
  showPhase('phase-input');
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  const memorizeVisible = !$('phase-memorize').classList.contains('hidden');
  const reviewVisible = !$('phase-review').classList.contains('hidden');

  if (memorizeVisible) {
    if (e.key === 'ArrowRight' || e.key === 'Enter') {
      e.preventDefault();
      nextWord();
    } else if (e.key === 'e' || e.key === 'E') {
      e.preventDefault();
      addToErrorBook();
    }
  }

  if (reviewVisible) {
    if (e.key === 'ArrowRight' || e.key === 'Enter') {
      e.preventDefault();
      nextReviewWord();
    }
  }
});
</script>

</body>
</html>
